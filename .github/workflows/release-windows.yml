name: release-windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "${env:VCPKG_ROOT}"
          git -C "${env:VCPKG_ROOT}" checkout b781af668027bbf77f2f827f47b5c6cd8d825c08
          & "${env:VCPKG_ROOT}/bootstrap-vcpkg.bat" -disableMetrics

      - name: Verify release tools
        shell: pwsh
        run: |
          gh --version
          cmake --version

      - name: Configure
        shell: pwsh
        run: cmake --preset ci-windows

      - name: Build
        shell: pwsh
        run: cmake --build --preset ci-windows

      - name: Test
        shell: pwsh
        run: ctest --preset ci-windows

      - name: Package release zip
        shell: pwsh
        run: ./scripts/package-windows-release.ps1 -Tag "${env:TAG}"

      - name: Smoke release directory
        shell: pwsh
        run: |
          $dist = Join-Path $PWD 'dist/windows-release'
          $exe = Join-Path $dist 'rastertoolbox.exe'
          $gdalData = Join-Path $dist 'share/gdal'
          $projLib = Join-Path $dist 'share/proj'
          if (-not (Test-Path $exe -PathType Leaf)) { throw "missing executable: $exe" }
          if (-not (Test-Path $gdalData -PathType Container)) { throw "missing GDAL data dir: $gdalData" }
          if (-not (Test-Path $projLib -PathType Container)) { throw "missing PROJ data dir: $projLib" }

          $env:QT_QPA_PLATFORM = 'offscreen'
          $env:GDAL_DATA = $gdalData
          $env:PROJ_LIB = $projLib

          $logPath = Join-Path $PWD 'dist/smoke.log'
          & $exe --smoke-startup 2>&1 | Tee-Object -FilePath $logPath
          if (-not (Select-String -Path $logPath -Pattern 'smoke-startup:ok' -Quiet)) {
            throw 'smoke-startup marker not found'
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-release-${{ github.ref_name }}
          path: dist/RasterToolbox-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release asset
        shell: pwsh
        run: |
          $viewOutput = gh release view "${env:TAG}" --json id 2>&1
          if ($LASTEXITCODE -ne 0) {
            if ($viewOutput -match '404') {
              gh release create "${env:TAG}" --verify-tag --title "${env:TAG}" --notes ""
              if ($LASTEXITCODE -ne 0) { throw 'failed to create release' }
            } else {
              $viewOutput | Write-Host
              throw 'failed to query release'
            }
          }

          gh release upload "${env:TAG}" "dist/RasterToolbox-${env:TAG}-windows-x64.zip" --clobber
          if ($LASTEXITCODE -ne 0) { throw 'failed to upload release asset' }

          gh release view "${env:TAG}" --json url --jq '.url'
