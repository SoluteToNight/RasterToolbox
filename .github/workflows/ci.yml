name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Configure
        run: pixi run ci-configure

      - name: Build
        run: pixi run ci-build

      - name: Test
        run: pixi run ci-test

      - name: Smoke
        run: pixi run ci-smoke

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup MSYS2 (MinGW64 + deps)
        uses: msys2/setup-msys2@fb197b72ce45fb24f17bf3f807a388985654d1f2 # v2.29.0
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-nlohmann-json
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools

      - name: Configure
        run: cmake --preset ci-windows

      - name: Build
        run: cmake --build --preset ci-windows

      - name: Test
        run: ctest --preset ci-windows
