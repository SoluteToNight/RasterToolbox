name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Configure
        run: pixi run ci-configure

      - name: Build
        run: pixi run ci-build

      - name: Test
        run: pixi run ci-test

      - name: Smoke
        run: pixi run ci-smoke

  windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "${env:VCPKG_ROOT}"
          git -C "${env:VCPKG_ROOT}" checkout b781af668027bbf77f2f827f47b5c6cd8d825c08
          & "${env:VCPKG_ROOT}/bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure
        shell: pwsh
        run: cmake --preset ci-windows

      - name: Build
        shell: pwsh
        run: cmake --build --preset ci-windows

      - name: Test
        shell: pwsh
        run: ctest --preset ci-windows
